let lockoutTimerInterval = null;

function initLoginScreen() {
  const role = appState.loginRole || 'customer';
  setLoginRole(role);
  
  const lockoutUntil = localStorage.getItem('biozfresh_lockout_until');
  if (lockoutUntil) {
    const until = parseInt(lockoutUntil, 10);
    if (Date.now() < until) {
      startLockoutCountdown(until);
    } else {
      localStorage.removeItem('biozfresh_lockout_until');
      localStorage.removeItem('biozfresh_failed_attempts');
    }
  }
}

function startLockoutCountdown(until) {
  const errorBox = document.getElementById('login-error-box');
  const errorText = document.getElementById('login-error-text');
  const timerText = document.getElementById('login-lockout-countdown');
  const submitBtn = document.getElementById('login-submit-btn');
  const emailInput = document.getElementById('input-login-user');
  const passInput = document.getElementById('input-login-pass');
  
  if (!errorBox || !errorText || !timerText) return;
  
  errorBox.style.display = 'flex';
  errorText.innerText = 'Terlalu banyak percobaan masuk salah. Akun terkunci.';
  timerText.style.display = 'block';
  
  if (submitBtn) submitBtn.disabled = true;
  if (emailInput) emailInput.disabled = true;
  if (passInput) passInput.disabled = true;
  
  clearInterval(lockoutTimerInterval);
  lockoutTimerInterval = setInterval(() => {
    const remaining = Math.ceil((until - Date.now()) / 1000);
    if (remaining <= 0) {
      clearInterval(lockoutTimerInterval);
      errorBox.style.display = 'none';
      timerText.style.display = 'none';
      localStorage.removeItem('biozfresh_lockout_until');
      localStorage.removeItem('biozfresh_failed_attempts');
      
      if (submitBtn) submitBtn.disabled = false;
      if (emailInput) emailInput.disabled = false;
      if (passInput) passInput.disabled = false;
      
      showToast('Lockout selesai. Silakan coba masuk kembali.', 'success');
    } else {
      const minutes = Math.floor(remaining / 60);
      const seconds = remaining % 60;
      timerText.innerText = `Coba lagi dalam: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }
  }, 1000);
}

function handleLoginSubmit() {
  const emailInput = document.getElementById('input-login-user');
  const passInput = document.getElementById('input-login-pass');
  const errorBox = document.getElementById('login-error-box');
  const errorText = document.getElementById('login-error-text');
  
  const valEmailMsg = document.getElementById('error-input-login-user');
  const valPassMsg = document.getElementById('error-input-login-pass');
  
  if (!emailInput || !passInput) return;
  
  if (errorBox) errorBox.style.display = 'none';
  if (valEmailMsg) valEmailMsg.style.display = 'none';
  if (valPassMsg) valPassMsg.style.display = 'none';
  
  const email = emailInput.value.trim();
  const password = passInput.value.trim();
  const role = appState.loginRole || 'customer';
  const rememberMe = document.getElementById('login-remember-me') ? document.getElementById('login-remember-me').checked : false;
  
  const lockoutUntil = localStorage.getItem('biozfresh_lockout_until');
  if (lockoutUntil) {
    const until = parseInt(lockoutUntil, 10);
    if (Date.now() < until) {
      startLockoutCountdown(until);
      return;
    }
  }
  
  let hasError = false;
  if (!email) {
    if (valEmailMsg) {
      valEmailMsg.innerText = 'Email tidak boleh kosong';
      valEmailMsg.style.display = 'block';
    }
    hasError = true;
  } else {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!re.test(email)) {
      if (valEmailMsg) {
        valEmailMsg.innerText = 'Format email tidak valid';
        valEmailMsg.style.display = 'block';
      }
      hasError = true;
    }
  }
  
  if (!password) {
    if (valPassMsg) {
      valPassMsg.innerText = 'Password tidak boleh kosong';
      valPassMsg.style.display = 'block';
    }
    hasError = true;
  }
  
  if (hasError) return;
  
  const submitBtn = document.getElementById('login-submit-btn');
  if (submitBtn) setButtonLoading(submitBtn, true);
  
  setTimeout(() => {
    if (submitBtn) setButtonLoading(submitBtn, false);
    
    if (email.includes('503')) {
      if (errorBox && errorText) {
        errorBox.style.display = 'flex';
        errorText.innerText = 'Layanan server tidak tersedia (503). Silakan coba lagi nanti.';
      }
      return;
    }
    
    let isValid = false;
    let userName = '';
    
    if (role === 'customer') {
      if (email === 'customer@biozfresh.com' && password === 'customer123') {
        isValid = true;
        userName = 'Customer User';
      }
    } else if (role === 'worker') {
      if (email === 'worker@biozfresh.com' && password === 'worker123') {
        isValid = true;
        userName = 'Worker Delivery';
      }
    } else if (role === 'admin') {
      if (email === 'admin@biozfresh.com' && password === 'admin123') {
        isValid = true;
        userName = 'Admin Manager';
      }
    }
    
    if (isValid) {
      localStorage.removeItem('biozfresh_failed_attempts');
      localStorage.removeItem('biozfresh_lockout_until');
      
      if (rememberMe) {
        localStorage.setItem('biozfresh_remembered_email', email);
        localStorage.setItem('biozfresh_remembered_role', role);
      } else {
        localStorage.removeItem('biozfresh_remembered_email');
        localStorage.removeItem('biozfresh_remembered_role');
      }
      
      localStorage.setItem('biozfresh_role', role);
      localStorage.setItem('biozfresh_user', userName);
      
      showToast('Welcome back!', 'success');
      
      if (role === 'admin' || role === 'worker') {
        navigate('#admin-dashboard');
      } else {
        navigate('#home');
      }
    } else {
      const attemptsStr = localStorage.getItem('biozfresh_failed_attempts') || '0';
      const attempts = parseInt(attemptsStr, 10) + 1;
      localStorage.setItem('biozfresh_failed_attempts', attempts.toString());
      
      if (attempts >= 5) {
        const lockoutDuration = 15 * 60 * 1000;
        const lockoutUntilTime = Date.now() + lockoutDuration;
        localStorage.setItem('biozfresh_lockout_until', lockoutUntilTime.toString());
        startLockoutCountdown(lockoutUntilTime);
        showToast('Terlalu banyak kesalahan. Akun terkunci!', 'error');
      } else {
        if (errorBox && errorText) {
          errorBox.style.display = 'flex';
          errorText.innerText = `Email atau password salah. Sisa percobaan: ${5 - attempts}`;
        }
      }
    }
  }, 1000);
}

function applyPromo() {
  const input = document.getElementById('promo-input');
  if (input) {
    const val = input.value.trim().toUpperCase();
    if (val === 'FRESH10') {
      if (appState.promoApplied) {
        showToast('Promo code already applied', 'info');
        return;
      }
      appState.promoApplied = true;
      appState.promoCode = 'FRESH10';
      showToast('Promo code applied! 10% discount', 'success');
      renderCurrentScreen();
    } else if (val) {
      showToast('Promo code is not valid', 'error');
    } else {
      showToast('Please enter a promo code', 'info');
    }
  }
}

// Countdown timer interval runner
function startCountdownTimer() {
  if (appState.currentStatusIndex !== 3) {
    if (appState.countdownInterval) {
      clearInterval(appState.countdownInterval);
      appState.countdownInterval = null;
    }
    return;
  }
  
  if (appState.countdownInterval) return; // Already running
  
  appState.countdownInterval = setInterval(() => {
    // If element is gone from DOM, clear interval to save memory
    const timerEl = document.getElementById('countdown-timer-value');
    if (!timerEl) {
      clearInterval(appState.countdownInterval);
      appState.countdownInterval = null;
      return;
    }
    
    if (appState.countdownMinutes === 0 && appState.countdownSeconds === 0) {
      clearInterval(appState.countdownInterval);
      appState.countdownInterval = null;
      renderCurrentScreen();
      return;
    }
    
    if (appState.countdownSeconds === 0) {
      appState.countdownMinutes--;
      appState.countdownSeconds = 59;
    } else {
      appState.countdownSeconds--;
    }
    
    // Update DOM directly to prevent re-initializing maps or losing inputs
    const minStr = String(appState.countdownMinutes).padStart(2, '0');
    const secStr = String(appState.countdownSeconds).padStart(2, '0');
    timerEl.textContent = `${minStr}:${secStr}`;
  }, 1000);
}

// Interactive Star rating hover & click states
let hoveredStarIndex = null;
let selectedStarIndex = null;

function hoverStar(index) {
  hoveredStarIndex = index;
  updateStarColors();
}

function leaveStar() {
  hoveredStarIndex = null;
  updateStarColors();
}

function selectStar(index) {
  selectedStarIndex = index;
  updateStarColors();
  
  // Enable submit button
  const submitBtn = document.getElementById('rating-submit-btn');
  if (submitBtn) {
    submitBtn.removeAttribute('disabled');
    submitBtn.style.opacity = '1';
    submitBtn.style.cursor = 'pointer';
  }
}

function updateStarColors() {
  const activeIndex = hoveredStarIndex !== null ? hoveredStarIndex : selectedStarIndex;
  const stars = document.querySelectorAll('.star-picker-btn');
  stars.forEach((s, idx) => {
    if (activeIndex !== null && idx < activeIndex) {
      s.innerHTML = "★";
      s.style.color = "#FCD34D"; // Beautiful gold yellow
    } else {
      s.innerHTML = "☆";
      s.style.color = "#D1D5DB"; // Gray-300
    }
  });
}

// Close and submit rating
function submitCourierRating(isSkip = false) {
  ensureMockOrderDetails();
  const courier = APP_DATA.currentOrder.courier;
  
  if (isSkip) {
    courier.rating = { value: 5, comment: "Dilewati (Rating Otomatis 5 Bintang)" };
  } else {
    const commentEl = document.getElementById('rating-comment');
    const commentText = commentEl ? commentEl.value.trim() : "";
    courier.rating = { value: selectedStarIndex, comment: commentText };
  }
  
  // Hide modal
  appState.showRatingModal = false;
  hoveredStarIndex = null;
  selectedStarIndex = null;
  
  renderCurrentScreen();
  
  // Success Toast
  showToast("Terima kasih atas penilaianmu!", "success", 3000);
}

// Dev tools toggle status
function devChangeStatus(delta) {
  ensureMockOrderDetails();
  const newIndex = Math.max(0, Math.min(5, appState.currentStatusIndex + delta));
  if (newIndex !== appState.currentStatusIndex) {
    appState.justActivatedStatusIndex = newIndex;
    appState.currentStatusIndex = newIndex;
    
    // Clear countdown interval if not on_the_way
    if (newIndex !== 3 && appState.countdownInterval) {
      clearInterval(appState.countdownInterval);
      appState.countdownInterval = null;
    }
    
    // Auto-update order timestamps
    const statusKeys = ["order_received", "processing", "courier_assigned", "on_the_way", "arrived", "delivered"];
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
    
    const o = APP_DATA.currentOrder;
    if (delta > 0) {
      o.statusTimestamps[statusKeys[newIndex]] = timeStr;
    } else {
      o.statusTimestamps[statusKeys[newIndex + 1]] = "";
    }
    
    // Open rating modal if transitioned to delivered
    if (newIndex === 5) {
      appState.showRatingModal = true;
    }
    
    renderCurrentScreen();
    
    // Remove highlight state after 1 second
    setTimeout(() => {
      if (appState.justActivatedStatusIndex === newIndex) {
        delete appState.justActivatedStatusIndex;
        renderCurrentScreen();
      }
    }, 1000);
  }
}

function getCartTotal() {
  let count = 0, total = 0;
  if (!appState.cartTypes) appState.cartTypes = {};
  for (const [id, qty] of Object.entries(appState.cart)) {
    const p = APP_DATA.products.find(pr => pr.id == id);
    if (p) {
      count += qty;
      const type = appState.cartTypes[id] || 'refill';
      const itemPrice = type === 'new' ? p.price + 15000 : p.price;
      total += itemPrice * qty;
    }
  }
  return { count, total };
}

const MAX_DELIVERY_RADIUS_KM = 10;

// Initialize the Leaflet interactive map on checkout mount
function initLeafletMap() {
  // 1. Safety clean up to prevent "Map container is already initialized" Leaflet errors
  if (appState.leafletMap) {
    try {
      appState.leafletMap.off();
      appState.leafletMap.remove();
    } catch(err) {
      console.warn("Failed to remove old Leaflet map reference safely", err);
    }
    appState.leafletMap = null;
    appState.leafletMarker = null;
  }

  const mapContainer = document.getElementById('interactive-checkout-map');
  if (!mapContainer) return;

  // 2. Setup map center and zoom level
  const center = appState.customerCoords || STORE_COORDS;
  const map = L.map('interactive-checkout-map', {
    center: [center.lat, center.lng],
    zoom: 13,
    scrollWheelZoom: false
  });
  appState.leafletMap = map;

  // 3. Load beautiful OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // 4. Create premium blue teardrop SVG divIcon
  const customTeardropIcon = L.divIcon({
    className: 'custom-div-icon',
    html: `<div style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#2B2D82" stroke="#1E2060" stroke-width="1.5"/>
      </svg>
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
  });

  // 5. Add store delivery range circle (10 km radius)
  const circle = L.circle([STORE_COORDS.lat, STORE_COORDS.lng], {
    radius: MAX_DELIVERY_RADIUS_KM * 1000,
    fillColor: '#3B82F6',
    fillOpacity: 0.12,
    color: '#2563EB',
    weight: 1.5,
    opacity: 0.6
  }).addTo(map);
  
  // Tooltip on circle
  circle.bindTooltip("Area Pengiriman Biozfresh (maks. 10 km)");

  // 6. Setup active customer marker
  if (appState.customerCoords) {
    const marker = L.marker([appState.customerCoords.lat, appState.customerCoords.lng], {
      draggable: true,
      icon: customTeardropIcon
    }).addTo(map);
    appState.leafletMarker = marker;

    marker.on('dragend', function() {
      handleMarkerDragEnd(marker.getLatLng());
    });
  }

  // 7. Add map click handler (tap to position marker instantly)
  map.on('click', function(e) {
    const latlng = e.latlng;
    if (appState.leafletMarker) {
      appState.leafletMarker.setLatLng(latlng);
    } else {
      const marker = L.marker(latlng, {
        draggable: true,
        icon: customTeardropIcon
      }).addTo(map);
      appState.leafletMarker = marker;
      marker.on('dragend', function() {
        handleMarkerDragEnd(marker.getLatLng());
      });
    }
    handleMarkerDragEnd(latlng);
  });
}

// OpenStreetMap Nominatim reverse geocoder
async function fetchAddressFromCoords(lat, lng) {
  try {
    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`, {
      headers: {
        'User-Agent': 'Biozfresh-Mobile-App'
      }
    });
    if (!response.ok) throw new Error("API request failed");
    const data = await response.json();
    if (!data || !data.address) return "Gagal mendapatkan alamat";
    
    const addr = data.address;
    const road = addr.road || addr.pedestrian || addr.suburb || '';
    const suburb = addr.suburb || addr.village || addr.neighbourhood || addr.city_district || '';
    const city = addr.city || addr.town || addr.municipality || '';
    const postcode = addr.postcode || '';
    
    const parts = [road, suburb, city].filter(Boolean);
    let formatted = parts.join(', ');
    if (postcode) {
      formatted += ` ${postcode}`;
    }
    return formatted || "Alamat tidak ditemukan";
  } catch (err) {
    console.error("Nominatim Reverse Geocoding Error:", err);
    return "Gagal mendapatkan alamat";
  }
}

// Draggable marker callback with a 500ms debounce
function handleMarkerDragEnd(latlng) {
  const lat = latlng.lat;
  const lng = latlng.lng;
  
  // Set coordinates immediately
  appState.customerCoords = { lat, lng };
  
  // Compute distance and update delivery fee states instantly
  const dist = calculateHaversineDistance(STORE_COORDS, appState.customerCoords);
  const { fee, rateText, isOutOfRange } = calculateFee(dist);
  
  appState.deliveryDistanceStr = `${dist.toFixed(1)} km`;
  appState.deliveryFeeAmount = fee;
  appState.deliveryFeeStr = isOutOfRange ? "Di luar jangkauan" : `Rp ${fee.toLocaleString('id-ID')}`;
  appState.deliveryOutOfRange = isOutOfRange;
  appState.deliveryRateText = rateText;
  
  // Trigger loading address state
  appState.isLoadingAddress = true;
  
  // Re-render Checkout screen DOM to reflect new coordinates and fee breakdowns instantly
  renderCurrentScreen();
  
  // Debounced Nominatim call
  if (appState.geocodingDebounceTimer) {
    clearTimeout(appState.geocodingDebounceTimer);
  }
  
  appState.geocodingDebounceTimer = setTimeout(async () => {
    const fetchedAddress = await fetchAddressFromCoords(lat, lng);
    appState.isLoadingAddress = false;
    APP_DATA.user.address = fetchedAddress;
    renderCurrentScreen();
  }, 500);
}

// Geolocate current location using browser GPS API
function handleGetCurrentLocation() {
  if (!navigator.geolocation) {
    appState.locationError = "Geolocation tidak didukung oleh browser Anda.";
    renderCurrentScreen();
    return;
  }
  
  appState.isGettingLocation = true;
  appState.locationError = null;
  renderCurrentScreen();
  
  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      
      appState.customerCoords = { lat, lng };
      
      // Calculate Haversine and rates
      const dist = calculateHaversineDistance(STORE_COORDS, appState.customerCoords);
      const { fee, rateText, isOutOfRange } = calculateFee(dist);
      
      appState.deliveryDistanceStr = `${dist.toFixed(1)} km`;
      appState.deliveryFeeAmount = fee;
      appState.deliveryFeeStr = isOutOfRange ? "Di luar jangkauan" : `Rp ${fee.toLocaleString('id-ID')}`;
      appState.deliveryOutOfRange = isOutOfRange;
      appState.deliveryRateText = rateText;
      
      // Handle Leaflet updates
      if (appState.leafletMap) {
        appState.leafletMap.panTo([lat, lng]);
        
        const customTeardropIcon = L.divIcon({
          className: 'custom-div-icon',
          html: `<div style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#2B2D82" stroke="#1E2060" stroke-width="1.5"/>
            </svg>
          </div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 32],
        });
        
        if (appState.leafletMarker) {
          appState.leafletMarker.setLatLng([lat, lng]);
        } else {
          const marker = L.marker([lat, lng], {
            draggable: true,
            icon: customTeardropIcon
          }).addTo(appState.leafletMap);
          appState.leafletMarker = marker;
          marker.on('dragend', function() {
            handleMarkerDragEnd(marker.getLatLng());
          });
        }
      }
      
      // Fetch geocode address
      appState.isLoadingAddress = true;
      renderCurrentScreen();
      
      const fetchedAddress = await fetchAddressFromCoords(lat, lng);
      appState.isLoadingAddress = false;
      APP_DATA.user.address = fetchedAddress;
      appState.isGettingLocation = false;
      
      renderCurrentScreen();
    },
    (error) => {
      console.error("GPS Geolocation Error:", error);
      appState.isGettingLocation = false;
      
      let errorMsg = "Gagal mendapatkan lokasi.";
      if (error.code === 1) {
        errorMsg = "Akses lokasi ditolak. Aktifkan izin lokasi di browser Anda.";
      } else if (error.code === 2) {
        errorMsg = "Lokasi tidak tersedia. Coba lagi.";
      } else if (error.code === 3) {
        errorMsg = "Permintaan lokasi timeout. Coba lagi.";
      }
      
      appState.locationError = errorMsg;
      renderCurrentScreen();
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
  );
}

const STORE_COORDS = { lat: -7.2575, lng: 112.7521 };

function calculateHaversineDistance(coords1, coords2) {
  const R = 6371; // Earth radius in km
  const dLat = ((coords2.lat - coords1.lat) * Math.PI) / 180;
  const dLng = ((coords2.lng - coords1.lng) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos((coords1.lat * Math.PI) / 180) *
      Math.cos((coords2.lat * Math.PI) / 180) *
      Math.sin(dLng / 2) *
      Math.sin(dLng / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function calculateFee(dist) {
  if (dist > 10) return { fee: 0, rateText: "Di luar jangkauan", isOutOfRange: true };
  
  let fee = 0;
  let rateText = "";
  
  if (dist <= 1) {
    fee = 2000;
    rateText = "Tarif flat Rp 2.000 (≤ 1 km)";
  } else if (dist <= 3) {
    fee = Math.round(dist * 2000);
    rateText = "Tarif Rp 2.000 / km (1 - 3 km)";
  } else if (dist <= 5) {
    fee = Math.round(dist * 2500);
    rateText = "Tarif Rp 2.500 / km (3 - 5 km)";
  } else {
    fee = Math.round(dist * 3000);
    rateText = "Tarif Rp 3.000 / km (> 5 km)";
  }
  
  return { fee, rateText, isOutOfRange: false };
}

function updateDeliveryFee(coords) {
  if (!coords) return;
  appState.isCalculatingDelivery = true;
  appState.customerCoords = coords;
  renderCurrentScreen();

  setTimeout(() => {
    try {
      const dist = calculateHaversineDistance(STORE_COORDS, coords);
      const { fee, rateText, isOutOfRange } = calculateFee(dist);

      appState.deliveryDistanceStr = `${dist.toFixed(1)} km`;
      appState.deliveryFeeAmount = fee;
      appState.deliveryFeeStr = isOutOfRange ? "Di luar jangkauan" : `Rp ${fee.toLocaleString("id-ID")}`;
      appState.deliveryOutOfRange = isOutOfRange;
      appState.deliveryRateText = rateText;
    } catch (err) {
      console.error("Error calculating delivery:", err);
    } finally {
      appState.isCalculatingDelivery = false;
      renderCurrentScreen();
    }
  }, 600); // 600ms latency simulation
}

function getDeliveryDates() {
  const dates = [];
  const daysShort = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
  const daysLong = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
  const monthsLong = [
    "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
  ];
  
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    dates.push({
      index: i,
      dateObj: d,
      dayShort: daysShort[d.getDay()],
      dayLong: daysLong[d.getDay()],
      dateNum: d.getDate(),
      monthLong: monthsLong[d.getMonth()],
      year: d.getFullYear(),
      isToday: i === 0,
    });
  }
  return dates;
}

function getDeliverySlots(selectedDateIndex) {
  const isSelectedToday = selectedDateIndex === 0;
  const isPast15 = new Date().getHours() >= 15;
  
  const slots = [
    { key: "pagi", label: "Pagi", time: "08.00–11.00", icon: "🌅" },
    { key: "siang", label: "Siang", time: "11.00–14.00", icon: "☀️" },
    { key: "sore", label: "Sore", time: "14.00–17.00", icon: "🌤️" },
    { key: "malam", label: "Malam", time: "17.00–20.00", icon: "🌙" },
  ];

  return slots.map(slot => {
    let isFull = false;
    let isDisabled = false;

    // Rule: Today's Pagi is always full
    if (isSelectedToday && slot.key === "pagi") {
      isFull = true;
    }

    // Rule: Tomorrow's Siang is always full
    if (selectedDateIndex === 1 && slot.key === "siang") {
      isFull = true;
    }

    // Rule: Past 15:00, today's Pagi, Siang, Sore slots are disabled (only Malam available)
    if (isSelectedToday && isPast15 && slot.key !== "malam") {
      isDisabled = true;
    }

    return { ...slot, isFull, isDisabled };
  });
}

function changeDeliveryDate(idx) {
  appState.selectedDateIndex = idx;
  appState.selectedSlot = null; // reset slot selection
  renderCurrentScreen();

function selectDeliverySlot(slotKey) {
  const slots = getDeliverySlots(appState.selectedDateIndex);
  const slot = slots.find(s => s.key === slotKey);
  if (slot && !slot.isFull && !slot.isDisabled) {
    appState.selectedSlot = slotKey;
    renderCurrentScreen();
  }
}

function isPresetActive(presetKey) {
  const presets = {
    near: { lat: -7.2530, lng: 112.7585 },
    medium: { lat: -7.2420, lng: 112.7380 },
    far: { lat: -7.2180, lng: 112.6990 },
    out: { lat: -7.1680, lng: 112.6900 }
  };
  const target = presets[presetKey];
  if (!target || !appState.customerCoords) return false;
  return Math.abs(appState.customerCoords.lat - target.lat) < 0.0001 &&
         Math.abs(appState.customerCoords.lng - target.lng) < 0.0001;
}

function renderCurrentScreen() {
  const hash = window.location.hash || '';
  const role = localStorage.getItem('biozfresh_role');
  const isLoggedIn = role !== null;

  // Route Guard
  if (!isLoggedIn) {
    if (hash !== '' && hash !== '#welcome' && hash !== '#register' && hash !== '#login') {
      window.location.hash = '#login';
      return;
    }
  } else {
    if (role === 'admin' || role === 'worker') {
      if (!hash.startsWith('#admin-') && hash !== '#profile' && hash !== '#edit-profile' && hash !== '#edit-profile-success') {
        window.location.hash = '#admin-dashboard';
        return;
      }
    } else if (role === 'customer') {
      if (hash.startsWith('#admin-') || hash === '' || hash === '#welcome' || hash === '#register' || hash === '#login') {
        window.location.hash = '#home';
        return;
      }
    }
  }

  const fn = routes[hash] || 'renderWelcome';
  const app = document.getElementById('app');
  const _prevHash = appState._currentHash || '';
  const _isNewPage = _prevHash !== hash;
  appState._currentHash = hash;

  // Show skeleton for home on first load
  if (hash === '#home' && !appState._homeLoaded) {
    appState._homeLoaded = true;
    app.innerHTML = renderHomeSkeleton();
    setTimeout(() => {
      if (window[fn]) app.innerHTML = window[fn]();
      if (_isNewPage) window.scrollTo(0, 0);
      initPullToRefresh();
    }, 1200);
    return;
  }

  if (window[fn]) app.innerHTML = window[fn]();
  if (_isNewPage) window.scrollTo(0, 0);

  // Post-render hooks
  setTimeout(() => {
    if (hash === '#home') initPullToRefresh();
    if (hash === '#checkout') initLeafletMap();
    if (hash === '#order-detail') startCountdownTimer();
    afterRender(hash);
  }, 100);
}

// === Toast System ===
function showToast(message, type = 'info', duration = 2500) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type] || ''}</span>${message}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 250);
  }, duration);
}

// === Modal System ===
function showModal(content, opts = {}) {
  const { center = false, onClose } = opts;
  const overlay = document.createElement('div');
  overlay.className = `modal-overlay${center ? ' center' : ''}`;
  overlay.innerHTML = `<div class="modal">${center ? '' : '<div class="modal-handle"></div>'}${content}</div>`;
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal(overlay, onClose);
  });
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
  return overlay;
}

function closeModal(overlay, onClose) {
  if (!overlay) overlay = document.querySelector('.modal-overlay');
  if (!overlay) return;
  const modal = overlay.querySelector('.modal');
  if (modal) modal.classList.add('closing');
  overlay.style.animation = 'fadeOut 200ms ease forwards';
  setTimeout(() => {
    overlay.remove();
    document.body.style.overflow = '';
    if (onClose) onClose();
  }, 200);
}

// === Confirm Modal ===
function showConfirm(title, message, opts = {}) {
  const { icon = '⚠️', iconType = 'warning', confirmText = 'Confirm', cancelText = 'Cancel', onConfirm, onCancel, danger = false } = opts;
  const content = `
    <div class="confirm-modal-icon ${iconType}">${icon}</div>
    <div class="modal-title">${title}</div>
    <div class="modal-subtitle">${message}</div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">${cancelText}</button>
      <button class="btn ${danger ? 'btn-danger' : 'btn-primary'} btn-sm" id="confirm-action-btn">${confirmText}</button>
    </div>`;
  const overlay = showModal(content, { center: true });
  overlay.querySelector('#confirm-action-btn').addEventListener('click', () => {
    closeModal(overlay);
    if (onConfirm) onConfirm();
  });
}

  else appState.cart[id] = newQty;
  const el = document.getElementById('modal-qty');
  if (el) { el.textContent = newQty; el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'checkmarkPop 200ms ease'; }
}

  const value = input.value.trim();
  let error = '';
  if (rules.required && !value) error = 'This field is required';
  else if (rules.email && value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) error = 'Invalid email address';
  else if (rules.minLength && value.length < rules.minLength) error = `Minimum ${rules.minLength} characters`;
  else if (rules.phone && value && !/^[\d\s\-+()]{8,}$/.test(value)) error = 'Invalid phone number';
  if (error) {
    group.classList.add('error'); group.classList.remove('success');
    let errEl = group.querySelector('.form-error');
    if (!errEl) { errEl = document.createElement('div'); errEl.className = 'form-error'; group.appendChild(errEl); }
    errEl.textContent = error; errEl.style.display = 'block';
    return false;
  }
  group.classList.remove('error'); group.classList.add('success');
  const errEl = group.querySelector('.form-error');
  if (errEl) errEl.style.display = 'none';
  return true;
}

const originalSendMessage = window.sendMessage;
window.sendMessage = function() {
  const input = document.getElementById('chat-input') || document.getElementById('admin-chat-input');
  if (!input || !input.value.trim()) return;
  
  const chatId = appState.adminCurrentChat || appState.currentChat;
  const chatData = APP_DATA.chatMessages[chatId];
  if (!chatData) return;
  
  const textValue = input.value.trim();
  const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  
  chatData.messages.push({
    id: Date.now(), 
    text: textValue, 
    sent: true,
    time: timeStr,
    date: chatData.messages[chatData.messages.length - 1]?.date || 'Today'
  });
  
  // Update last message preview di sidebar chat list
  const contact = APP_DATA.chatContacts.find(c => c.id === chatId);
  if (contact) {
    contact.lastMessage = textValue.length > 25 ? textValue.substring(0, 22) + '...' : textValue;
    contact.time = timeStr;
  }

  // Sinkronisasi ke Firestore (jika SDK aktif)
  try {
    if (db) {
      db.collection('chats').doc(chatId.toString()).collection('messages').add({
        senderId: 'W-04',
        text: textValue,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        readBy: ['W-04']
      });
    }
  } catch (e) {
    console.log("Firestore offline backup used.");
  }
  
  input.value = '';
  renderCurrentScreen();
  
  // Auto-scroll ke pesan paling bawah
  setTimeout(() => {
    const msgs = document.getElementById('chat-messages') || document.querySelector('.conversation-messages');
    if (msgs) msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' });
    
    // Picu simulasi jawaban otomatis bot/pelanggan biar aplikasi interaktif
    setTimeout(() => {
      appState.workerChatTyping = chatId;
      renderCurrentScreen();
      
      setTimeout(() => {
        delete appState.workerChatTyping;

        const botReply = replies[Math.floor(Math.random() * replies.length)];
        
        chatData.messages.push({
          id: Date.now(), 
          text: botReply, 
          sent: false,
          time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
          date: 'Today'
        });

          contact.lastMessage = botReply;

        renderCurrentScreen();

// === Pull to Refresh ===
function initPullToRefresh() {
  const screen = document.querySelector('.home-screen');
  if (!screen) return;
  let startY = 0, pulling = false;
  screen.addEventListener('touchstart', e => { if (screen.scrollTop === 0) { startY = e.touches[0].pageY; pulling = true; } });
  screen.addEventListener('touchmove', e => {
    if (!pulling) return;
    const diff = e.touches[0].pageY - startY;
    if (diff > 60) {
      let ptr = screen.querySelector('.ptr-indicator');
      if (!ptr) { ptr = document.createElement('div'); ptr.className = 'ptr-indicator'; ptr.innerHTML = '<div class="spinner"></div> Refreshing...'; screen.querySelector('.home-content')?.prepend(ptr); }
      ptr.classList.add('visible');
    }
  });
  screen.addEventListener('touchend', () => {
    if (!pulling) return; pulling = false;
    const ptr = screen.querySelector('.ptr-indicator');
    if (ptr?.classList.contains('visible')) {
      setTimeout(() => { ptr.classList.remove('visible'); setTimeout(() => ptr?.remove(), 300); showToast('Content refreshed!', 'success'); }, 1200);
    }
  });
}

// === Quick Reorder ===
function quickReorder() {
  const lastOrder = APP_DATA.orderHistory[0];
  if (!lastOrder) return;
  reorderFromHistory(lastOrder.id);
}

function reorderFromHistory(orderId) {
  // Find the order from history
  const order = APP_DATA.orderHistory.find(o => o.id === orderId);
  if (!order) {
    showToast('Pesanan tidak ditemukan', 'error');
    return;
  }

  // Clear existing cart to avoid mixing old and new items
  appState.cart = {};
  appState.cartTypes = {};

  // Map order items back to products and add to cart
  let itemsAdded = 0;
  order.items.forEach(item => {
    // Try to match product by name (fuzzy match: first word of item name)
    const searchTerm = item.name.toLowerCase().split(' ')[0];
    const product = APP_DATA.products.find(p => p.name.toLowerCase().includes(searchTerm));
    if (product) {
      appState.cart[product.id] = item.qty || 1;
      // Determine type from item name
      if (item.name.toLowerCase().includes('refill') || item.name.toLowerCase().includes('isi ulang')) {
        appState.cartTypes[product.id] = 'refill';
      } else if (item.name.toLowerCase().includes('baru') || item.name.toLowerCase().includes('new')) {
        appState.cartTypes[product.id] = 'new';
      } else {
        appState.cartTypes[product.id] = 'refill';
      }
      itemsAdded++;
    }
  });

  if (itemsAdded === 0) {
    showToast('Produk dari pesanan ini sudah tidak tersedia', 'error');
    return;
  }

  // Store the last order reference in appState
  appState.lastOrder = order;
  appState.reorderToastMessage = `Item dari pesanan #${orderId} sudah ditambahkan ke keranjangmu!`;

  // Navigate directly to checkout
  navigate('#checkout');

  // Show confirmation toast after navigation (slight delay for screen render)
  setTimeout(() => {
    showToast(appState.reorderToastMessage, 'success', 3500);
    appState.reorderToastMessage = null;
  }, 400);
}

  const existing = group.querySelector('.address-validation-msg');
  if (existing) existing.remove();
  if (val.length < 10) {
    input.classList.add('address-invalid');
    input.classList.remove('address-valid');
    const msg = document.createElement('div');
    msg.className = 'address-validation-msg invalid';
    msg.textContent = '⚠ Address must be at least 10 characters';

  input.classList.remove('address-invalid');
  input.classList.add('address-valid');
  const msg = document.createElement('div');
  msg.className = 'address-validation-msg valid';
  msg.textContent = '✓ Address looks valid';
  group.appendChild(msg);
  return true;
}

// === Enhanced Checkout Confirmation ===
function confirmCheckoutEnhanced() {
  const { count, total } = getCartTotal();
  if (count === 0) { showToast('Your cart is empty', 'error'); return; }
  if (appState.deliveryOutOfRange) { showToast('Alamat di luar jangkauan pengiriman', 'error'); return; }
  if (!appState.selectedSlot) { showToast('Pilih jadwal pengiriman terlebih dahulu', 'error'); return; }

  let discount = 0;
  if (appState.promoApplied) {
    discount = Math.round(total * 0.1);
  }
  const shippingFee = appState.deliveryOutOfRange ? 0 : appState.deliveryFeeAmount;
  const grandTotal = total + shippingFee - discount;
  const notes = document.getElementById('delivery-notes')?.value || '';

  const dates = getDeliveryDates();
  const activeDate = dates.find(d => d.index === appState.selectedDateIndex) || dates[0];
  const slots = getDeliverySlots(appState.selectedDateIndex);
  const slotDetails = slots.find(s => s.key === appState.selectedSlot);
  const scheduleStr = `${activeDate.dayLong}, ${activeDate.dateNum} ${activeDate.monthLong} (${slotDetails ? slotDetails.label : ''})`;

  showConfirm('Confirm Order', `Place order for ${count} gallon(s) totaling Rp ${grandTotal.toLocaleString('id-ID')}?\nJadwal: ${scheduleStr}${notes ? '\n\nNote: ' + notes : ''}`, {
    icon: '📦', iconType: 'success', confirmText: 'Place Order', cancelText: 'Review',
    onConfirm: () => {
      const orderIdVal = 'BF-' + Math.floor(10000 + Math.random() * 90000);
      // Save actual order details to APP_DATA.currentOrder for dynamic tracking & invoice
      APP_DATA.currentOrder = {
        id: orderIdVal,
        status: 'In Progress',
        courier: {
          name: 'Kevin de Bruyne',
          phone: '+6281 2345 6789',
          avatar: null,
        },
        address: APP_DATA.user.address,
        items: Object.entries(appState.cart).map(([id, qty]) => {
          const p = APP_DATA.products.find(pr => pr.id == id);
          const type = appState.cartTypes[id] || 'refill';
          const typeLabel = type === 'new' ? 'Galon Baru' : 'Isi Ulang';
          return { name: `${p.name} (${typeLabel})`, qty, price: `Rp ${(p.price * qty).toLocaleString('id-ID')}` };
        }),
        distance: appState.deliveryDistanceStr,
        distancePrice: `Rp ${shippingFee.toLocaleString('id-ID')}`,
        total: `Rp ${grandTotal.toLocaleString('id-ID')}`,
        date: `${activeDate.dateNum} ${activeDate.monthLong} ${activeDate.year} (${slotDetails ? slotDetails.time : ''})`,
        paymentMethod: appState.paymentMethod === 'transfer' ? 'Transfer Bank' : appState.paymentMethod === 'ewallet' ? 'E-Wallet' : appState.paymentMethod === 'paylater' ? 'Paylater' : 'COD',
        estimatedDelivery: `${activeDate.dayLong}, pukul ${slotDetails ? slotDetails.time : ''}`,
      };

      // Push to ADMIN_DATA.allOrders
      const newAdminOrder = {
        id: orderIdVal,
        customerName: APP_DATA.user.name,
        email: APP_DATA.user.email || 'customer@biozfresh.co',
        phone: APP_DATA.user.phone || '+62 812-3456-7890',
        date: new Date().toLocaleString('en-US', { month: 'long', day: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }),
        items: Object.entries(appState.cart).map(([id, qty]) => {
          const p = APP_DATA.products.find(pr => pr.id == id);
          const type = appState.cartTypes[id] || 'refill';
          const typeLabel = type === 'new' ? 'Baru' : 'Refill';
          return { name: `${p.name} ${typeLabel}`, qty, price: p.price };
        }),
        total: grandTotal,
        paymentMethod: appState.paymentMethod === 'transfer' ? 'Transfer' : appState.paymentMethod === 'ewallet' ? 'E-Wallet' : appState.paymentMethod === 'paylater' ? 'Paylater' : 'Cash',
        status: 'received',
        address: APP_DATA.user.address
      };
      ADMIN_DATA.allOrders.unshift(newAdminOrder);

      // Increment total orders count in profile
      APP_DATA.user.totalOrders += 1;

      showToast('Processing order...', 'info', 1000);
      setTimeout(() => {
        if (appState.paymentMethod === 'transfer') {
          navigate('#confirm-payment');
        } else {
          // Reset cart & promo immediately for non-transfer payment
          appState.cart = {};
          appState.cartTypes = {};
          appState.promoApplied = false;

const origRenderCurrentScreen = window.renderCurrentScreen;
window.renderCurrentScreen = function() {
  const hash = window.location.hash || '';
  const _prevHash = appState._currentHash || '';
  const _isNewPage = _prevHash !== hash;
  const savedScrollY = window.scrollY;

  // Execute original renderCurrentScreen (contains route guards, rendering, and post-render hooks)
  if (typeof origRenderCurrentScreen === 'function') {
    origRenderCurrentScreen();
  }

  // If it's a re-render of the same page, restore the scroll position
  if (!_isNewPage) {
    window.scrollTo(0, savedScrollY);
    // Use requestAnimationFrame as a fallback to ensure layout has settled
    requestAnimationFrame(() => {
      window.scrollTo(0, savedScrollY);
    });
  }
};

function toggleAdminOrder(orderId) {
  if (!appState.expandedOrders) appState.expandedOrders = {};
  appState.expandedOrders[orderId] = !appState.expandedOrders[orderId];
  const el = document.getElementById(`order-card-${orderId}`);
  if (el) el.classList.toggle('expanded');
}

function updateAdminOrderStatus(orderId, newStatus) {
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  if (order) {
    order.status = newStatus;
    
    // Sync with APP_DATA.currentOrder if it's the active order
    if (APP_DATA.currentOrder && APP_DATA.currentOrder.id === orderId) {
      if (newStatus === 'processing' || newStatus === 'received' || newStatus === 'assigned') {
        APP_DATA.currentOrder.status = 'In Progress';
      } else if (newStatus === 'completed') {
        APP_DATA.currentOrder.status = 'Delivered';
      } else if (newStatus === 'cancelled') {
        APP_DATA.currentOrder.status = 'Cancelled';
      }
      
      // Update appState.currentStatusIndex
      if (newStatus === 'received') {
        appState.currentStatusIndex = 0;
      } else if (newStatus === 'processing') {
        appState.currentStatusIndex = 1;
        appState.deliveryStatus = 'processing';
      } else if (newStatus === 'assigned') {
        appState.currentStatusIndex = 3;
        appState.deliveryStatus = 'on-the-way';
      } else if (newStatus === 'completed') {
        appState.currentStatusIndex = 5;
        appState.deliveryStatus = 'delivered';
      }

      // Sync order timeline status timestamps
      const statusKeys = ["order_received", "processing", "courier_assigned", "on_the_way", "arrived", "delivered"];
      const now = new Date();
      const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
      const o = APP_DATA.currentOrder;
      
      if (!o.statusTimestamps) {
        o.statusTimestamps = {
          order_received: "",
          processing: "",
          courier_assigned: "",
          on_the_way: "",
          arrived: "",
          delivered: ""
        };
      }
      
      const targetIndex = appState.currentStatusIndex;
      for (let i = 0; i <= 5; i++) {
        if (i <= targetIndex) {
          if (!o.statusTimestamps[statusKeys[i]]) {
            o.statusTimestamps[statusKeys[i]] = timeStr;
          }
        } else {
          o.statusTimestamps[statusKeys[i]] = "";
        }
      }
      
      // Start or clear countdown timer
      if (appState.currentStatusIndex !== 3 && appState.countdownInterval) {
        clearInterval(appState.countdownInterval);
        appState.countdownInterval = null;
      } else if (appState.currentStatusIndex === 3 && !appState.countdownInterval) {
        appState.countdownMinutes = 30;
        appState.countdownSeconds = 0;
      }
    }
    
    showToast(`Status order ${orderId} diperbarui!`, 'success');
    renderAdminOrderList();
  }
}

function assignWorkerToOrder(orderId, workerId) {
  if (!workerId) return;
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  const worker = ADMIN_DATA.workers.find(w => w.id === Number(workerId));
  if (order && worker) {
    order.courier = {
      name: worker.name,

    showToast(`Produk ${product.name} [${product.type}] ${checked ? 'diaktifkan' : 'dinonaktifkan'}`, 'success');
  }
}

function deleteProduct(id) {
  showConfirm('Hapus Produk', 'Apakah Anda yakin ingin menghapus produk ini?', {
    confirmText: 'Hapus',
    cancelText: 'Batal',
    danger: true,
    onConfirm: () => {
      const idx = ADMIN_DATA.products.findIndex(p => p.id === id);
      if (idx !== -1) {
        const prod = ADMIN_DATA.products[idx];
        ADMIN_DATA.products.splice(idx, 1);

        showToast(`Produk ${prod.name} [${prod.type}] berhasil dihapus`, 'success');
        renderAdminProductList();

  });

function saveAdminProduct(productId = null) {
  const name = document.getElementById('prod-name').value.trim();
  const type = document.getElementById('prod-type').value;
  const price = parseInt(document.getElementById('prod-price').value) || 0;
  const volume = document.getElementById('prod-volume').value.trim();
  const material = document.getElementById('prod-material').value.trim();
  const waterSource = document.getElementById('prod-source').value.trim();
  const certification = document.getElementById('prod-cert').value.trim();
  const description = document.getElementById('prod-desc').value.trim();
  
  if (!name || !price) {
    showToast('Nama produk dan harga harus diisi!', 'error');
    return;
  }
  
  const productsArray = ADMIN_DATA.products;
  
  if (productId !== null) {
    const p = productsArray.find(x => x.id === productId);
    if (p) {
      p.name = name.toUpperCase();
      p.type = type;
      p.price = price;
      p.priceLabel = `Rp ${price.toLocaleString('id-ID')}`;
      p.volume = volume;
      p.size = volume;
      p.material = material;
      p.waterSource = waterSource;
      p.certification = certification;
      p.description = description;
      showToast('Produk berhasil diperbarui!', 'success');
    }
  } else {
    const nextId = productsArray.length > 0 ? Math.max(...productsArray.map(x => x.id)) + 1 : 1;
    const newProduct = {
      id: nextId,
      name: name.toUpperCase(),
      type: type,
      price: price,
      priceLabel: `Rp ${price.toLocaleString('id-ID')}`,
      stock: 0,
      isActive: true,
      volume: volume || '19L',
      size: volume || '19L',
      material: material || 'PET',
      waterSource: waterSource || 'Mata Air Gunung',
      certification: certification || 'SNI, BPOM',
      description: description || ''
    };
    productsArray.push(newProduct);
    showToast('Produk baru berhasil ditambahkan!', 'success');
  }
  APP_DATA.products = ADMIN_DATA.products;
  
  closeModal();
  renderAdminProductList();
}

function renderAdminStockList() {
  const container = document.getElementById('admin-stock-container');
  if (!container) return;

  const searchQuery = (appState.stockSearch || '').toLowerCase();
  const activeFilter = appState.stockFilter || 'all';
  
  // Filter products based on search query
  let products = ADMIN_DATA.products || [];
  if (searchQuery) {
    products = products.filter(p => p.name.toLowerCase().includes(searchQuery) || (p.type || '').toLowerCase().includes(searchQuery));
  }

  // Apply stock status filter
  if (activeFilter === 'in') {
    products = products.filter(p => p.stock > 15);
  } else if (activeFilter === 'low') {
    products = products.filter(p => p.stock >= 1 && p.stock <= 15);
  } else if (activeFilter === 'out') {
    products = products.filter(p => p.stock === 0);
  }

  // Calculate metrics
  const totalProducts = (ADMIN_DATA.products || []).length;
  const inStock = (ADMIN_DATA.products || []).filter(p => p.stock > 15).length;
  const lowStock = (ADMIN_DATA.products || []).filter(p => p.stock >= 1 && p.stock <= 15).length;
  const offStock = (ADMIN_DATA.products || []).filter(p => p.stock === 0).length;

  // Update stats badges & counters
  const totalBadge = document.getElementById('stock-total-products-badge');
  if (totalBadge) totalBadge.textContent = totalProducts;

function submitStockAdjustment(preselectedId = null) {
  const selectEl = document.getElementById('adjust-prod-id');
  const typeEl = document.getElementById('adjust-type');
  const qtyEl = document.getElementById('adjust-qty');
  if (!typeEl || !qtyEl) return;

  const productId = preselectedId !== null ? preselectedId : parseInt(selectEl.value);
  const changeType = typeEl.value;
  const changeQty = parseInt(qtyEl.value) || 0;

  const product = ADMIN_DATA.products.find(p => p.id === productId);
  if (!product) return;

  const oldStock = product.stock;
  let newStock = oldStock;

  if (changeType === 'add') {
    newStock += changeQty;
  } else if (changeType === 'sub') {
    newStock -= changeQty;
  } else if (changeType === 'set') {
    newStock = changeQty;
  }

  if (newStock < 0) {
    showToast('Stok tidak boleh kurang dari 0!', 'error');
    return;
  }

  product.stock = newStock;
  product.outOfStock = newStock === 0;
  APP_DATA.products = ADMIN_DATA.products;

  // Log stock change
  const diff = newStock - oldStock;
  if (diff !== 0) {
    if (!ADMIN_DATA.stockLogs) {
      ADMIN_DATA.stockLogs = [];
    }
    const operatorName = localStorage.getItem('biozfresh_user') || 'Worker Delivery';
    ADMIN_DATA.stockLogs.unshift({
      id: Date.now(),
      productName: product.name,
      type: product.type,
      amount: diff,
      operator: operatorName,
      action: diff > 0 ? 'Restock' : 'Adjustment',
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    });
  }

  showToast(`Stok ${product.name} berhasil diperbarui menjadi ${newStock}`, 'success');
  closeModal();
  renderCurrentScreen();
}

        <input type="text" placeholder="Tulis jawaban..." id="owner-chat-input" onkeydown="if(event.key==='Enter')sendAdminChatMessage()" style="flex:1; background:var(--bg-light); border:1px solid var(--border-color); border-radius:9999px; padding:10px 16px; font-size:13px; outline:none; color:var(--text-primary);" />

function sendAdminChatMessage() {
  // 1. Ambil input dari text box milik Owner (ID: owner-chat-input)
  const input = document.getElementById('owner-chat-input');
  if (!input || !input.value.trim()) return;

  const chatId = appState.adminCurrentChat || appState.currentChat;
  const chatData = APP_DATA.chatMessages[chatId];
  if (!chatData) return;

  const text = input.value.trim();
  const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  const dateStr = 'Today';

  const newMsg = {
    id: Date.now(),
    text,
    sent: true, // true artinya dikirim oleh Owner (posisi bubble di kanan)
    time: timeStr,
    date: dateStr,
    read: false
  };

  chatData.messages.push(newMsg);

  const contact = APP_DATA.chatContacts.find(c => c.id === chatId);
  if (contact) {
    contact.lastMessage = text.length > 25 ? text.substring(0, 22) + '...' : text;
    contact.time = timeStr;
  }

  // 2. Push ke Firestore dengan Role 'owner'
  try {
    if (db) {
      db.collection('chats').doc(chatId.toString()).collection('messages').add({
        senderId: 'owner', // Diubah jadi owner supaya database tahu ini kiriman admin/owner
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        readBy: ['owner']
      }).then(() => {
        db.collection('chats').doc(chatId.toString()).set({
          lastMessage: text.length > 25 ? text.substring(0, 22) + '...' : text,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      });
    }
  } catch (err) {
    console.error("Firestore sync failed, fallback to simulated websocket sync.", err);
  }

  input.value = '';
  renderCurrentScreen();

  // 3. Scroll otomatis ke bawah pada container chat room milik Owner
  setTimeout(() => {
    const container = document.getElementById('owner-chat-messages');
    if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
  }, 50);
}

function startNewConversation(name, type) {
  closeModal();
  let contact = APP_DATA.chatContacts.find(c => c.name.toLowerCase() === name.toLowerCase() && c.type === type);
  if (!contact) {
    const mockId = Math.floor(Math.random() * 1000) + 100;
    contact = {
      id: mockId,
      name: name,
      type: type,
      avatar: null,
      unread: 0,
      lastMessage: 'Memulai percakapan baru...',
      time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
      color: type === 'worker' ? '#2196F3' : '#4CAF50',
      isOnline: true
    };
    APP_DATA.chatContacts.push(contact);
    APP_DATA.chatMessages[mockId] = {
      name: name,
      messages: []
    };
  }
  changeWorkerChatRoom(contact.id);
}

  const contact = APP_DATA.chatContacts.find(c => c.id === chatId);
  const isOnline = contact ? contact.isOnline !== false : true;
  const isTyping = appState.workerChatTyping === chatId;

  let messagesHTML = '';
  let lastDate = '';

  (chatData.messages || []).forEach(msg => {
    if (msg.date !== lastDate) {
      lastDate = msg.date;
      messagesHTML += `<div class="conversation-date" style="text-align:center; font-size:10px; color:var(--text-muted); margin:12px 0;">${msg.date}</div>`;
    }
    const isSentByMe = msg.sent;

    let bubbleContent = '';

function sendWorkerChatMessage() {
  const input = document.getElementById('worker-chat-input');
  if (!input || !input.value.trim()) return;

  const chatId = appState.adminCurrentChat || appState.currentChat;
  const chatData = APP_DATA.chatMessages[chatId];
  if (!chatData) return;

  const text = input.value.trim();
  const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  const dateStr = 'Today';

  const newMsg = {
    id: Date.now(),
    text,
    sent: true,
    time: timeStr,
    date: dateStr,
    read: false
  };

  chatData.messages.push(newMsg);

  const contact = APP_DATA.chatContacts.find(c => c.id === chatId);
  if (contact) {
    contact.lastMessage = text.length > 25 ? text.substring(0, 22) + '...' : text;
    contact.time = timeStr;
  }

  // Firestore push
  try {
    if (db) {
      db.collection('chats').doc(chatId.toString()).collection('messages').add({
        senderId: 'W-04',
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        readBy: ['W-04']
      }).then(() => {
        db.collection('chats').doc(chatId.toString()).set({
          lastMessage: text.length > 25 ? text.substring(0, 22) + '...' : text,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      });
    }
  } catch (err) {
    console.error("Firestore sync failed, fallback to simulated websocket sync.", err);
  }

  input.value = '';
  renderCurrentScreen();

  setTimeout(() => {
    const container = document.getElementById('chat-messages');
    if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
  }, 50);

  simulateReceivedWorkerReply(chatId);
}

function simulateReceivedWorkerReply(chatId) {
  setTimeout(() => {
    appState.workerChatTyping = chatId;
    const indicator = document.getElementById('worker-typing-indicator');
    if (indicator) {
      indicator.textContent = 'sedang mengetik...';
      indicator.style.color = '#2A49FF';
    }
  }, 1500);

  setTimeout(() => {
    const chatData = APP_DATA.chatMessages[chatId];
    if (!chatData) return;

    delete appState.workerChatTyping;

    const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    const replies = [
      "Baik mas, terima kasih konfirmasinya.",
      "Siap, ditunggu ya mas di lokasi.",
      "Oke bro, segera diluncurkan.",
      "Sudah dibayar tunai tadi ya.",
      "Tolong taruh di depan pintu saja."
    ];
    const text = replies[Math.floor(Math.random() * replies.length)];

    chatData.messages.push({
      id: Date.now(),
      text,
      sent: false,
      time: timeStr,
      date: 'Today'
    });

    chatData.messages.forEach(m => {
      if (m.sent) m.read = true;
    });

    const contact = APP_DATA.chatContacts.find(c => c.id === chatId);
    if (contact) {
      contact.lastMessage = text.length > 25 ? text.substring(0, 22) + '...' : text;
      contact.time = timeStr;
    }

    renderCurrentScreen();

    setTimeout(() => {
      const container = document.getElementById('chat-messages');
      if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }, 50);

    showToast(`Pesan baru dari ${chatData.name}: "${text}"`, 'info');
  }, 4000);
}

function saveWorker(workerId) {
  const name = document.getElementById('worker-name').value.trim();
  const phone = document.getElementById('worker-phone').value.trim();
  const vehicle = document.getElementById('worker-vehicle').value.trim();
  const attendance = document.getElementById('worker-attendance').value;
  const isActive = document.getElementById('worker-active').checked;
  
  if (!name || !phone || !vehicle) {
    showToast('Harap isi semua kolom data kurir.', 'error');
    return;
  }
  
  if (workerId) {
    const worker = ADMIN_DATA.workers.find(w => w.id === workerId);
    if (worker) {
      worker.name = name;
      worker.phone = phone;
      worker.vehicle = vehicle;
      worker.attendance = attendance;
      worker.isActive = isActive;
      showToast(`Data kurir ${name} diperbarui.`, 'success');
    }
  } else {
    const nextId = ADMIN_DATA.workers.length > 0 ? Math.max(...ADMIN_DATA.workers.map(w => w.id)) + 1 : 1;
    const formattedWorkerId = 'W-' + String(nextId).padStart(2, '0');
    ADMIN_DATA.workers.push({
      id: nextId,
      workerId: formattedWorkerId,
      name,
      phone,
      vehicle,
      isActive,
      attendance,
      totalDeliveries: 0,
      rating: 5.0
    });
    showToast(`Kurir ${name} berhasil ditambahkan.`, 'success');
  }
  closeModal();
  renderCurrentScreen();
}

function takeOrder(orderId, courierName) {
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  const worker = ADMIN_DATA.workers.find(w => w.name === courierName);
  if (order && worker) {
    order.courier = {
      name: worker.name,
      phone: worker.phone,
      vehicleNumber: worker.vehicle
    };
    order.status = 'assigned';
    showToast(`Order ${orderId} berhasil Anda ambil!`, 'success');
    renderCurrentScreen();
  }
}

function quickUpdateStock(productId) {
  const product = ADMIN_DATA.products.find(p => p.id === productId);
  if (!product) return;
  
  const content = `
    <div class="modal-title" style="margin-bottom:12px; font-size:15px; font-weight:700; color:var(--text-primary)">
      Update Stok: ${product.name}
    </div>
    <div style="text-align:left; margin-bottom:16px;">
      <label class="admin-form-label" style="font-size:11px; font-weight:700; display:block; color:var(--text-secondary); margin-bottom:6px;">Jumlah Stok Baru</label>
      <input type="number" id="quick-stock-input" class="admin-form-input" value="${product.stock}" style="width:100%; box-sizing:border-box; padding:8px 12px; border:1px solid var(--border-color); border-radius:8px;" />
    </div>
    <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:8px;">
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary btn-sm" onclick="saveQuickStock(${productId})">Simpan</button>
    </div>
  `;
  showModal(content, { center: true });
}

function saveQuickStock(productId) {
  const input = document.getElementById('quick-stock-input');
  if (!input) return;
  const newStock = parseInt(input.value) || 0;
  
  const product = ADMIN_DATA.products.find(p => p.id === productId);
  if (product) {
    const oldStock = product.stock;
    product.stock = newStock;
    if (newStock > 0) {
      product.outOfStock = false;
    } else {
      product.outOfStock = true;
    }
    
    APP_DATA.products = ADMIN_DATA.products;
    
    // Log stock change
    const diff = newStock - oldStock;
    if (diff !== 0) {
      if (!ADMIN_DATA.stockLogs) {
        ADMIN_DATA.stockLogs = [];
      }
      ADMIN_DATA.stockLogs.unshift({
        id: Date.now(),
        productName: product.name,
        type: product.type,
        amount: diff,
        operator: diff > 0 ? (localStorage.getItem('biozfresh_user') || 'Worker Delivery') : 'Order Adjustment',
        action: diff > 0 ? 'Restock' : 'Adjustment',
        date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      });
    }
    
    showToast(`Stok ${product.name} diperbarui menjadi ${newStock}.`, 'success');
    closeModal();
    renderCurrentScreen();
  }
}

function getProductSoldCount(product) {
  let sold = 0;
  
  // Scan allOrders
  const completedOrders = (ADMIN_DATA.allOrders || []).filter(o => o.status === 'completed');
  completedOrders.forEach(o => {
    (o.items || []).forEach(item => {
      if (item.name.toUpperCase().includes(product.name.toUpperCase()) && 
          ((product.type === 'Refill' && item.name.toUpperCase().includes('REFILL')) || 
           (product.type === 'Baru' && !item.name.toUpperCase().includes('REFILL')))) {
        sold += item.qty;
      }
    });
  });
  
  // Scan deliveryHistory
  if (ADMIN_DATA.deliveryHistory) {
    const completedDeliveries = ADMIN_DATA.deliveryHistory.filter(d => d.status === 'Completed');
    completedDeliveries.forEach(d => {
      (d.items || []).forEach(item => {
        if (item.name.toUpperCase().includes(product.name.toUpperCase()) && 
            ((product.type === 'Refill' && item.name.toUpperCase().includes('REFILL')) || 
             (product.type === 'Baru' && !item.name.toUpperCase().includes('REFILL')))) {
          sold += item.qty;
        }
      });
    });
  }
  
  // Fallback to match Figma mockup look
  if (sold === 0) {
    const hash = (product.id * 7) % 15 + 2;
    sold = hash;
  }
  return sold;
}

// Mock Backend API Service
const WORKER_API = {
  clockIn: function(workerId, timestamp) {
    console.log('API Call: POST /api/attendance/clock-in', { workerId, timestamp });
    const time = new Date(timestamp);
    const hours = time.getHours();
    const minutes = time.getMinutes();
    
    // Compare with 08:00 AM
    const limitHour = 8;
    const limitMinute = 0;
    
    const isLate = hours > limitHour || (hours === limitHour && minutes > limitMinute);
    let delayMinutes = 0;
    if (isLate) {
      delayMinutes = (hours - limitHour) * 60 + (minutes - limitMinute);
    }
    
    const status = isLate ? 'Late' : 'On Time';
    const clockInStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    const dateStr = `${time.getFullYear()}-${String(time.getMonth()+1).padStart(2,'0')}-${String(time.getDate()).padStart(2,'0')}`;
    
    // Sync attendance status to ADMIN_DATA.workers
    const worker = ADMIN_DATA.workers.find(w => w.workerId === workerId);
    if (worker) {
      worker.attendance = 'Hadir'; // 'Hadir' is checked in
    }
    
    if (!ADMIN_DATA.attendanceRecords) {
      ADMIN_DATA.attendanceRecords = getInitialAttendanceRecords(workerId);
    }
    
    // Remove if already exists for today
    ADMIN_DATA.attendanceRecords = ADMIN_DATA.attendanceRecords.filter(r => r.workerId !== workerId || r.date !== dateStr);
    
    const newRecord = {
      workerId,
      date: dateStr,
      status,
      clockIn: clockInStr,
      delayMinutes
    };
    ADMIN_DATA.attendanceRecords.push(newRecord);
    
    // Persist check-in locally
    localStorage.setItem(`biozfresh_attendance_${workerId}_${dateStr}`, JSON.stringify(newRecord));
    
    return {
      success: true,
      data: newRecord
    };
  },
  
  getAttendance: function(workerId, month) {
    console.log(`API Call: GET /api/attendance/${workerId}?month=${month}`);
    if (!ADMIN_DATA.attendanceRecords) {
      ADMIN_DATA.attendanceRecords = getInitialAttendanceRecords(workerId);
    }
    
    const records = ADMIN_DATA.attendanceRecords.filter(r => r.workerId === workerId && r.date.startsWith(month));
    
    const stats = {
      present: records.filter(r => r.status === 'On Time').length,
      late: records.filter(r => r.status === 'Late').length,
      absent: records.filter(r => r.status === 'Absent').length
    };
    
    return {
      records,
      stats
    };
  },
  
  getDeliveryHistory: function(workerId, limit = 20) {
    console.log(`API Call: GET /api/delivery-history/${workerId}?limit=${limit}`);
    if (!ADMIN_DATA.deliveryHistory) {
      ADMIN_DATA.deliveryHistory = getInitialDeliveryHistory(workerId);
    }
    
    return ADMIN_DATA.deliveryHistory.filter(d => d.workerId === workerId).slice(0, limit);
  }
};

// ============================================
// GLOBAL clockIn() — called by Attend button
// ============================================
function clockIn() {
  const workerName = localStorage.getItem('biozfresh_user') || 'Worker Delivery';
  const workerObj = ADMIN_DATA.workers.find(w => w.name === workerName);
  const workerId = workerObj ? workerObj.workerId : 'W-04';

  const btn = document.getElementById('btn-attend-now');
  if (btn) { btn.disabled = true; btn.textContent = 'Mencatat...'; }

  const result = WORKER_API.clockIn(workerId, new Date().toISOString());

  if (result && result.success) {
    // Also update worker.attendance by name as safety fallback
    const w = ADMIN_DATA.workers.find(w => w.name === workerName);
    if (w) w.attendance = 'Hadir';
    const clockInTime = result.data ? result.data.clockIn : '';
    showToast('Absensi berhasil dicatat!' + (clockInTime ? ' ' + clockInTime : ''), 'success');
    renderCurrentScreen();
  } else {
    showToast('Gagal mencatat absensi.', 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Attend'; }
  }
}

  const adminPreviewHTML = (ADMIN_DATA.workers || [])

          color:#64748B;
          margin:2px 0 6px 0;
        ">

          background:${w.attendance === 'Hadir'
            ? 'rgba(16,185,129,0.1)'
            : 'rgba(239,68,68,0.1)'};
          color:${w.attendance === 'Hadir'

          padding:3px 8px;
          border-radius:6px;
        ">
          ${w.attendance || 'Hadir'}
        </span>
      </div>
    `)
    .join('');

  // Tunggu halaman selesai dirender
  setTimeout(() => {

    let attempts = 0;

    const injectInterval = setInterval(() => {

      attempts++;

      // Sudah ada? stop
      if (document.getElementById('owner-inserted-admin-list-card')) {
        clearInterval(injectInterval);
        return;
      }

      const cards = document.querySelectorAll('.worker-center-card');

      let statisticCard = null;

      cards.forEach(card => {
        if (
          card.innerText &&
          card.innerText.includes('Statistik Bulan Ini')
        ) {
          statisticCard = card;
        }
      });

      if (statisticCard) {

        const adminCard = document.createElement('div');

        adminCard.id = 'owner-inserted-admin-list-card';
        adminCard.className = statisticCard.className;

        adminCard.innerHTML = `
          <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:12px;
          ">
            <span style="
              font-size:11px;
              font-weight:800;

                font-weight:700;
                color:#0F6E56;
                cursor:pointer;
              "
            >
              See All
            </span>
          </div>

          <div style="
            display:flex;
            gap:10px;
            overflow-x:auto;
            padding-bottom:4px;
          ">
            ${adminPreviewHTML}
          </div>
        `;

        // Sisipkan tepat di bawah statistik
        statisticCard.insertAdjacentElement(
          'afterend',
          adminCard
        );

        clearInterval(injectInterval);
      }

      // Timeout 5 detik
      if (attempts > 100) {
        clearInterval(injectInterval);

    }, 50);

  }, 100);

  return renderWorkerCenter();

function toggleDeliveryDetail(id) {
  const panel = document.getElementById(`delivery-detail-${id}`);
  const chevron = document.getElementById(`delivery-chevron-${id}`);
  if (!panel) return;
  
  if (panel.classList.contains('expanded')) {
    panel.classList.remove('expanded');
    panel.style.maxHeight = '0px';
    panel.style.padding = '0px 12px';
    if (chevron) chevron.style.transform = 'rotate(0deg)';
  } else {
    panel.classList.add('expanded');
    panel.style.maxHeight = '500px';
    panel.style.padding = '12px';
    if (chevron) chevron.style.transform = 'rotate(180deg)';
  }
}

function getWeeklyDeliveryChartData() {
  const days = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
  const now = new Date();
  const result = [];
  
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(now.getDate() - i);
    const dayName = days[d.getDay()];
    
    const monthNamesFull = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const fullDateStr = `${monthNamesFull[d.getMonth()]} ${String(d.getDate()).padStart(2, '0')}, ${d.getFullYear()}`;
    
    const count = (ADMIN_DATA.deliveryHistory || []).filter(del => 
      del.workerId === 'W-04' && 
      del.status === 'Completed' && 
      del.date.includes(fullDateStr)
    ).length;
    
    result.push({
      label: dayName,
      count: count,
      isToday: i === 0
    });
  }
  return result;
}

// Mock Backend API Service for Orders
const ORDER_API = {
  getIncoming: function() {
    console.log('API Call: GET /api/orders?status=incoming');
    return ADMIN_DATA.allOrders.filter(o => (o.status === 'received' || o.status === 'processing') && !o.courier);
  },
  
  takeOrder: function(orderId, workerId) {
    console.log(`API Call: POST /api/orders/${orderId}/take`, { workerId });
    const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
    const worker = ADMIN_DATA.workers.find(w => w.workerId === workerId);
    if (order && worker) {
      order.courier = {
        name: worker.name,
        phone: worker.phone,
        vehicleNumber: worker.vehicle
      };
      order.status = 'assigned';
      order.takeTime = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      return { success: true, order };
    }
    return { success: false, error: 'Order or Worker not found' };
  },
  
  getOngoing: function(workerId) {
    console.log(`API Call: GET /api/orders?status=ongoing&workerId=${workerId}`);
    const worker = ADMIN_DATA.workers.find(w => w.workerId === workerId);
    if (!worker) return [];
    return ADMIN_DATA.allOrders.filter(o => o.status === 'assigned' && o.courier && o.courier.name === worker.name);
  },
  
  completeOrder: function(orderId, workerId, photo = null, timestamp = Date.now()) {
    console.log(`API Call: POST /api/orders/${orderId}/complete`, { workerId, photo, timestamp });
    const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
    const worker = ADMIN_DATA.workers.find(w => w.workerId === workerId);
    if (order && worker) {
      order.status = 'completed';
      order.completionTime = new Date(timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      
      // Update or add to ADMIN_DATA.deliveryHistory
      if (!ADMIN_DATA.deliveryHistory) {
        ADMIN_DATA.deliveryHistory = getInitialDeliveryHistory(workerId);
      }
      
      const exists = ADMIN_DATA.deliveryHistory.some(d => d.id === orderId);
      if (!exists) {
        const date = new Date(timestamp);
        const monthNamesFull = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const dateStr = `${monthNamesFull[date.getMonth()]} ${String(date.getDate()).padStart(2, '0')}, ${date.getFullYear()}, ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        
        const completionTimeStr = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        const duration = Math.floor(Math.random() * 20) + 20; // 20-40 mins
        
        ADMIN_DATA.deliveryHistory.unshift({
          id: orderId,
          workerId: workerId,
          date: dateStr,
          customerName: order.customerName,
          address: order.address,
          items: order.items,
          total: order.total,
          status: 'Completed',
          completionTime: completionTimeStr,
          takeTime: order.takeTime || '14:15',
          durationMinutes: duration,
          rating: 5,
          review: 'Pesanan diantar dengan bukti foto.',
          photo: photo
        });
      }
      
      // Increment total deliveries for stats
      worker.totalDeliveries = (worker.totalDeliveries || 0) + 1;
      
      return { success: true, order };
    }
    return { success: false, error: 'Order or Worker not found' };
  },
  
  getSent: function(workerId) {
    console.log(`API Call: GET /api/orders?status=sent&workerId=${workerId}`);
    if (!ADMIN_DATA.deliveryHistory) {
      ADMIN_DATA.deliveryHistory = getInitialDeliveryHistory(workerId);
    }
    return ADMIN_DATA.deliveryHistory.filter(d => d.workerId === workerId && d.status === 'Completed');
  }
};

function renderWorkerOrderDetailScreen(orderId) {
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  if (!order) {
    return `<div class="admin-screen"><p>Order tidak ditemukan.</p></div>`;
  }
  const workerName = localStorage.getItem('biozfresh_user') || 'Worker Delivery';
  
  const itemsHTML = order.items.map(it => `

    </div>
  `).join('');
  
  // Render Map and Route in setTimeout
  setTimeout(() => {
    const mapContainer = document.getElementById('worker-order-map');
    if (mapContainer && typeof L !== 'undefined') {
      const map = L.map('worker-order-map', { zoomControl: false }).setView([-7.2530, 112.7585], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
      }).addTo(map);
      
      // Pin Customer with Custom DivIcon
      const custIcon = L.divIcon({
        className: 'custom-map-pin customer-pin',
        html: '<div class="pin-inner">🏠</div>',
        iconSize: [36, 36],
        iconAnchor: [18, 36]
      });
      const custMarker = L.marker([-7.2520, 112.7595], { icon: custIcon }).addTo(map);
      custMarker.bindPopup("<b>Pelanggan:</b><br>" + order.customerName).openPopup();
      
      // Pin Worker with Custom DivIcon
      const workIcon = L.divIcon({
        className: 'custom-map-pin worker-pin',
        html: '<div class="pin-inner">🛵</div>',
        iconSize: [36, 36],
        iconAnchor: [18, 36]
      });
      const workMarker = L.marker([-7.2540, 112.7575], { icon: workIcon }).addTo(map);
      workMarker.bindPopup("<b>Lokasi Anda</b>").openPopup();
      
      // Route line
      const route = L.polyline([
        [-7.2540, 112.7575],
        [-7.2530, 112.7580],
        [-7.2520, 112.7595]
      ], { color: 'var(--primary-blue)', weight: 5, opacity: 0.8 }).addTo(map);
      
      map.fitBounds(route.getBounds(), { padding: [40, 40] });
    }
  }, 100);

function triggerPhotoUpload() {
  const input = document.getElementById('proof-photo-input');
  if (input) input.click();
}

function handleProofPhotoSelect(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const placeholder = document.getElementById('proof-photo-placeholder');
      const container = document.getElementById('proof-photo-preview-container');
      const img = document.getElementById('proof-photo-preview');
      
      if (placeholder) placeholder.style.display = 'none';
      if (container) container.style.display = 'block';
      if (img) {
        img.src = evt.target.result;
        appState.completeOrderPhoto = evt.target.result;
      }
    };
    reader.readAsDataURL(file);
  }
}

function clearProofPhoto(e) {
  if (e) e.stopPropagation();
  appState.completeOrderPhoto = null;
  const placeholder = document.getElementById('proof-photo-placeholder');
  const container = document.getElementById('proof-photo-preview-container');
  const img = document.getElementById('proof-photo-preview');
  const input = document.getElementById('proof-photo-input');
  
  if (placeholder) placeholder.style.display = 'block';
  if (container) container.style.display = 'none';
  if (img) img.src = '';
  if (input) input.value = '';
}

function confirmCompleteOrderAction(orderId) {
  const res = ORDER_API.completeOrder(orderId, 'W-04', appState.completeOrderPhoto, Date.now());
  if (res.success) {
    showToast(`Order ${orderId} selesai diantar!`, 'success');
    closeModal();
    appState.selectedWorkerOrderId = null;
    appState.completeOrderPhoto = null;
    appState.workerOrderTab = 'sent';
    renderCurrentScreen();
  }
}

// Chat integration helper
function chatWithCustomer(customerName) {
  let contact = APP_DATA.chatContacts.find(c => c.name === customerName);
  if (!contact) {
    const mockId = Math.floor(Math.random() * 1000) + 10;
    contact = {
      id: mockId,
      name: customerName,
      avatar: null,
      unread: 0,
      lastMessage: 'Halo, saya kurir Biozfresh. Ada di mana ya lokasinya?',
      time: '12.00',
      color: '#0C447C'
    };
    APP_DATA.chatContacts.push(contact);
    APP_DATA.chatMessages[mockId] = {
      name: customerName,
      messages: [
        { id: 1, text: 'Halo, saya kurir Biozfresh. Ada di mana ya lokasinya?', sent: true, time: '12.00', date: 'Today' }
      ]
    };
  }
  
  appState.currentChat = contact.id;
  closeWorkerOrderDetail();
  navigate('#admin-chat');
}

function openAssignWorkerModal(orderId) {
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  if (!order) return;
  const workers = (ADMIN_DATA.workers || []).filter(w => w.isActive && w.attendance === 'Hadir');
  const options = workers.map(w => `<option value="${w.id}">${w.name} · ${w.vehicle}</option>`).join('');
  const content = `
    <div class="modal-title">Verifikasi & Proses Order</div>
    <div class="modal-subtitle">Order ${order.id} · ${order.customerName}</div>
    <div class="form-group"><label class="form-label">Assign Worker</label>
    <select class="form-input" id="assign-worker-select">${options}</select></div>
    <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:10px;font-size:12px;color:#166534;margin-bottom:4px;">
      ✓ Pembayaran terverifikasi · Total: <strong>Rp ${order.total.toLocaleString('id-ID')}</strong>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary btn-sm" onclick="assignWorkerAndVerify('${order.id}')">Proses & Kirim</button>
    </div>`;
  showModal(content);
}

function assignWorkerAndVerify(orderId) {
  const workerId = parseInt(document.getElementById('assign-worker-select')?.value);
  if (!workerId) { showToast('Pilih worker terlebih dahulu', 'error'); return; }
  const worker = ADMIN_DATA.workers.find(w => w.id === workerId);
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  if (order && worker) {
    order.courier = { name: worker.name, phone: worker.phone, vehicleNumber: worker.vehicle };
    order.status = 'assigned';
    showToast(`Order ${orderId} diproses & dikirim oleh ${worker.name}`, 'success');
  }
  closeModal();
  renderCurrentScreen();
}

function rejectOrderAdmin(orderId) {
  showConfirm('Tolak Order?', `Order ${orderId} akan dibatalkan.`, {
    confirmText: 'Ya, Tolak', danger: true,
    onConfirm: () => {
      const idx = ADMIN_DATA.allOrders.findIndex(o => o.id === orderId);
      if (idx !== -1) ADMIN_DATA.allOrders.splice(idx, 1);
      showToast(`Order ${orderId} ditolak`, 'error');
      renderCurrentScreen();
    }
  });
}

function markOrderSentAdmin(orderId) {
  const order = ADMIN_DATA.allOrders.find(o => o.id === orderId);
  if (order) {
    order.status = 'completed';
    order.feedback = 'Terima kasih! (Otomatis)';
    order.rating = 5;
    showToast(`Order ${orderId} ditandai selesai`, 'success');
  }
  renderCurrentScreen();
}

// override sendAdminChatMessage to update UI properly
const originalSendAdmin = window.sendAdminChatMessage;
window.sendAdminChatMessage = function() {
  const input = document.getElementById('admin-chat-input');
  if (!input || !input.value.trim()) return;
  const chatId = appState.adminCurrentChat || appState.currentChat;
  const chatData = APP_DATA.chatMessages[chatId];
  if (!chatData) return;
  const text = input.value.trim();
  const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  chatData.messages.push({ id: Date.now(), text, sent: true, time: timeStr, date: 'Today' });
  const contact = APP_DATA.chatContacts.find(c => c.id === chatId);
  if (contact) { contact.lastMessage = text; contact.time = timeStr; }
  input.value = '';
  renderCurrentScreen();
  setTimeout(() => {
    const container = document.querySelector('.conversation-messages');
    if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
  }, 50);
};
